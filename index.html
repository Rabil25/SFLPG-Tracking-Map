<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Tracking Map — IndiHome</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(135deg, #1e3a5f, #0f2744);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #3b82f6;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo {
      width: 40px; height: 40px;
      background: #3b82f6;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-title h1 { font-size: 16px; font-weight: 700; color: #fff; }
    .header-title p  { font-size: 11px; color: #94a3b8; }
    .header-right { display: flex; align-items: center; gap: 10px; }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-green  { background: #065f46; color: #6ee7b7; }
    .badge-blue   { background: #1e40af; color: #93c5fd; }
    .badge-yellow { background: #78350f; color: #fcd34d; }

    #last-update {
      font-size: 11px;
      color: #64748b;
    }
    #refresh-btn {
      background: #3b82f6;
      border: none;
      color: #fff;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    #refresh-btn:hover { background: #2563eb; }
    #refresh-btn.loading { opacity: 0.6; pointer-events: none; }

    /* ===== MAIN CONTENT ===== */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 300px;
      background: #1e293b;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #334155;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 12px 16px;
      background: #0f172a;
      border-bottom: 1px solid #334155;
    }
    .sidebar-header h3 { font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid #334155;
    }
    .stat-card {
      background: #0f172a;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat-card .num  { font-size: 24px; font-weight: 700; color: #3b82f6; }
    .stat-card .lbl  { font-size: 10px; color: #64748b; margin-top: 2px; }
    .stat-card.green .num { color: #10b981; }
    .stat-card.yellow .num { color: #f59e0b; }

    /* Filter wilayah */
    .filter-bar {
      padding: 8px 12px;
      border-bottom: 1px solid #334155;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    /* SF List */
    .sf-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .sf-list::-webkit-scrollbar { width: 4px; }
    .sf-list::-webkit-scrollbar-track { background: #1e293b; }
    .sf-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .sf-item {
      background: #0f172a;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .sf-item:hover, .sf-item.active {
      border-color: #3b82f6;
      background: #1e3a5f;
    }
    .sf-item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .sf-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 11px;
      flex-shrink: 0;
      margin-right: 8px;
    }
    .sf-name { font-size: 13px; font-weight: 600; flex: 1; }
    .sf-deal {
      background: #065f46;
      color: #6ee7b7;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .sf-info { font-size: 11px; color: #64748b; display: flex; gap: 8px; }
    .sf-info span { display: flex; align-items: center; gap: 3px; }

    /* ===== MAP ===== */
    #map {
      flex: 1;
      z-index: 1;
    }

    /* ===== POPUP ===== */
    .leaflet-popup-content-wrapper {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #3b82f6;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip { background: #1e293b; }
    .popup-content { padding: 4px; min-width: 200px; }
    .popup-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .popup-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 3px 0;
      border-bottom: 1px solid #334155;
      color: #94a3b8;
    }
    .popup-row:last-child { border-bottom: none; }
    .popup-row span:last-child { color: #e2e8f0; font-weight: 500; }
    .popup-foto {
      margin-top: 8px;
      width: 100%;
      border-radius: 6px;
      max-height: 120px;
      object-fit: cover;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
    .empty-state p { font-size: 13px; }

    /* ===== MOBILE ===== */
    @media (max-width: 640px) {
      .sidebar { width: 100%; height: 200px; }
      .main { flex-direction: column; }
      .stats-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">📍</div>
    <div class="header-title">
      <h1 id="witel-name">SF Tracking Map</h1>
      <p id="tanggal-hari"></p>
    </div>
  </div>
  <div class="header-right">
    <span class="badge badge-green" id="badge-hadir">0 Hadir</span>
    <span class="badge badge-blue"  id="badge-total">0 SF</span>
    <span id="last-update">–</span>
    <button id="refresh-btn" onclick="loadData()">
      <span id="refresh-icon">🔄</span> Refresh
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>Daftar SF Hari Ini</h3>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="num" id="stat-hadir">0</div>
        <div class="lbl">Hadir</div>
      </div>
      <div class="stat-card green">
        <div class="num" id="stat-deal">0</div>
        <div class="lbl">Total Deal</div>
      </div>
      <div class="stat-card yellow">
        <div class="num" id="stat-pct">0%</div>
        <div class="lbl">Kehadiran</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-total">0</div>
        <div class="lbl">Total SF</div>
      </div>
    </div>

    <!-- Filter wilayah -->
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" data-wok="semua" onclick="filterWilayah('semua', this)">
        Semua
      </button>
    </div>

    <!-- SF List -->
    <div class="sf-list" id="sf-list">
      <div class="empty-state">
        <div class="icon">⏳</div>
        <p>Memuat data...</p>
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div id="map"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ============================================================
// KONFIGURASI — EDIT BAGIAN INI
// ============================================================
const CONFIG = {
  apiUrl : 'https://script.google.com/macros/s/AKfycbzu20_TCRKiOL5jINtBTPnmwgXSK2iFPRCZp1-axt509pH2RFziXuQRlCYXyASMpGyu/exec',
  apiKey : 'indihomelpg26',
  // Auto refresh setiap 5 menit
  refreshInterval: 5 * 60 * 1000,
  // Koordinat center peta awal (sesuaikan dengan wilayah)
  mapCenter: [-2.5, 106.5],
  mapZoom  : 10,
};

// ============================================================
// INISIALISASI PETA
// ============================================================
const map = L.map('map', {
  center: CONFIG.mapCenter,
  zoom  : CONFIG.mapZoom,
  zoomControl: true,
});

// Tile layer OpenStreetMap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map);

// ============================================================
// STATE
// ============================================================
let allData     = [];
let markers     = {};
let totalSF     = 0;
let filterAktif = 'semua';

// Warna per WOK
const wokColors = [
  '#3b82f6','#10b981','#f59e0b','#ef4444',
  '#8b5cf6','#06b6d4','#f97316','#84cc16'
];
const wokColorMap = {};

// ============================================================
// LOAD DATA
// ============================================================
async function loadData() {
  const btn  = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  btn.classList.add('loading');
  icon.textContent = '⏳';

  try {
    // Ambil data posisi hari ini
    const [resPosisi, resSF] = await Promise.all([
      fetch(CONFIG.apiUrl + '?action=posisi&key=' + CONFIG.apiKey),
      fetch(CONFIG.apiUrl + '?action=sflist&key='  + CONFIG.apiKey),
    ]);

    const jsonPosisi = await resPosisi.json();
    const jsonSF     = await resSF.json();

    if (!jsonPosisi.ok) throw new Error(jsonPosisi.error);

    allData  = jsonPosisi.data || [];
    totalSF  = (jsonSF.data || []).length;

    // Update witel name
    document.getElementById('witel-name').textContent =
      'SF Map — ' + (jsonPosisi.witel || 'IndiHome');

    renderAll();

    // Update last update time
    const now = new Date();
    document.getElementById('last-update').textContent =
      'Update: ' + now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0');

  } catch(e) {
    console.error('Load error:', e);
    document.getElementById('sf-list').innerHTML =
      '<div class="empty-state"><div class="icon">❌</div><p>Gagal load data:<br>' + e.message + '</p></div>';
  }

  btn.classList.remove('loading');
  icon.textContent = '🔄';
}

// ============================================================
// RENDER SEMUA KOMPONEN
// ============================================================
function renderAll() {
  const filtered = filterAktif === 'semua'
    ? allData
    : allData.filter(d => d.wok === filterAktif);

  updateStats(filtered);
  updateFilterBar();
  renderSFList(filtered);
  renderMarkers(filtered);
}

// ============================================================
// UPDATE STATS
// ============================================================
function updateStats(data) {
  const totalDeal  = data.reduce((s, d) => s + (d.deal || 0), 0);
  const pct        = totalSF > 0 ? Math.round(data.length / totalSF * 100) : 0;

  document.getElementById('stat-hadir').textContent  = data.length;
  document.getElementById('stat-deal').textContent   = totalDeal;
  document.getElementById('stat-pct').textContent    = pct + '%';
  document.getElementById('stat-total').textContent  = totalSF;
  document.getElementById('badge-hadir').textContent = data.length + ' Hadir';
  document.getElementById('badge-total').textContent = totalSF + ' SF';
}

// ============================================================
// UPDATE FILTER BAR (wilayah)
// ============================================================
function updateFilterBar() {
  const wokSet = [...new Set(allData.map(d => d.wok).filter(w => w && w !== '-'))];

  // Assign warna per WOK
  wokSet.forEach((wok, i) => {
    if (!wokColorMap[wok]) wokColorMap[wok] = wokColors[i % wokColors.length];
  });

  const bar = document.getElementById('filter-bar');
  const semua = '<button class="filter-btn ' + (filterAktif==='semua'?'active':'') +
    '" data-wok="semua" onclick="filterWilayah(\'semua\', this)">Semua (' + allData.length + ')</button>';

  const wokBtns = wokSet.map(wok => {
    const cnt = allData.filter(d => d.wok === wok).length;
    return '<button class="filter-btn ' + (filterAktif===wok?'active':'') +
      '" data-wok="' + wok + '" onclick="filterWilayah(\'' + wok + '\', this)">' +
      wok + ' (' + cnt + ')</button>';
  }).join('');

  bar.innerHTML = semua + wokBtns;
}

// ============================================================
// FILTER WILAYAH
// ============================================================
function filterWilayah(wok, btn) {
  filterAktif = wok;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ============================================================
// RENDER SF LIST
// ============================================================
function renderSFList(data) {
  const container = document.getElementById('sf-list');

  if (!data.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Belum ada SF yang kirim posisi hari ini</p></div>';
    return;
  }

  // Sort: deal terbanyak dulu
  const sorted = [...data].sort((a, b) => (b.deal || 0) - (a.deal || 0));

  container.innerHTML = sorted.map((sf, i) => {
    const color   = wokColorMap[sf.wok] || '#3b82f6';
    const initial = sf.nama.charAt(0).toUpperCase();
    const medals  = ['🥇','🥈','🥉'];
    const rank    = medals[i] || (i+1) + '.';

    return `
      <div class="sf-item" id="sf-item-${sf.userId}" onclick="focusSF('${sf.userId}')">
        <div class="sf-item-top">
          <div style="display:flex;align-items:center;flex:1">
            <div class="sf-avatar" style="background:${color}20;color:${color};border:2px solid ${color}">
              ${initial}
            </div>
            <div>
              <div class="sf-name">${rank} ${sf.nama}</div>
              <div style="font-size:10px;color:#64748b">${sf.wok}</div>
            </div>
          </div>
          <div class="sf-deal">💼 ${sf.deal || 0}</div>
        </div>
        <div class="sf-info">
          <span>📍 ${sf.kelurahan}</span>
          <span>🕐 ${sf.waktu}</span>
        </div>
      </div>
    `;
  }).join('');
}

// ============================================================
// RENDER MARKERS DI PETA
// ============================================================
function renderMarkers(data) {
  // Hapus marker lama
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  data.forEach(sf => {
    if (!sf.lat || !sf.lng) return;

    const color   = wokColorMap[sf.wok] || '#3b82f6';
    const initial = sf.nama.charAt(0).toUpperCase();

    // Custom icon
    const icon = L.divIcon({
      className: '',
      html: `
        <div style="
          width:36px;height:36px;
          background:${color};
          border:3px solid #fff;
          border-radius:50% 50% 50% 0;
          transform:rotate(-45deg);
          display:flex;align-items:center;justify-content:center;
          box-shadow:0 3px 10px rgba(0,0,0,0.4);
        ">
          <span style="transform:rotate(45deg);color:#fff;font-weight:700;font-size:13px">
            ${initial}
          </span>
        </div>
      `,
      iconSize   : [36, 36],
      iconAnchor : [18, 36],
      popupAnchor: [0, -36],
    });

    const marker = L.marker([sf.lat, sf.lng], { icon }).addTo(map);

    // Popup content
    const fotoHtml = sf.foto
      ? `<img src="${sf.foto}" class="popup-foto" onerror="this.style.display='none'">`
      : '';

    marker.bindPopup(`
      <div class="popup-content">
        <div class="popup-name">
          <div style="width:32px;height:32px;background:${color};border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            color:#fff;font-weight:700;font-size:14px;flex-shrink:0">
            ${initial}
          </div>
          ${sf.nama}
        </div>
        <div class="popup-row"><span>📍 Area</span><span>${sf.kelurahan}</span></div>
        <div class="popup-row"><span>🕐 Waktu</span><span>${sf.waktu} WIB</span></div>
        <div class="popup-row"><span>🏝️ WOK</span><span>${sf.wok}</span></div>
        <div class="popup-row"><span>💼 Deal</span><span>${sf.deal || 0}</span></div>
        ${fotoHtml}
      </div>
    `, { maxWidth: 260 });

    markers[sf.userId] = marker;
  });
}

// ============================================================
// FOCUS KE SF TERTENTU
// ============================================================
function focusSF(userId) {
  const marker = markers[userId];
  if (!marker) return;

  map.flyTo(marker.getLatLng(), 15, { duration: 1 });
  marker.openPopup();

  // Highlight list item
  document.querySelectorAll('.sf-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('sf-item-' + userId);
  if (item) {
    item.classList.add('active');
    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ============================================================
// INIT
// ============================================================
document.getElementById('tanggal-hari').textContent =
  new Date().toLocaleDateString('id-ID', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

// Load pertama
loadData();

// Auto refresh
setInterval(loadData, CONFIG.refreshInterval);
</script>
</body>
</html>
